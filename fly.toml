# fly.toml app configuration file generated for massage-spa on 2026-04-29T22:08:57-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sanacion-consciente'
primary_region = 'gru'

[build]

[env]
  PORT = '3005'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3005
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
